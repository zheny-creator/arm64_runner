name: Build ARM64 Runner

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
    - name: Checkout code
      uses: actions/checkout@v5

    - name: Cache APT packages
      uses: actions/cache@v4
      with:
        path: /var/cache/apt/archives
        key: ${{ runner.os }}-apt-${{ hashFiles('Makefile') }}
        restore-keys: |
          ${{ runner.os }}-apt-

    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y build-essential gcc g++ make \
          libssl-dev libwayland-dev libcjson-dev libcurl4-openssl-dev \
          libasmjit-dev libcapstone-dev pkg-config wayland-protocols \
          curl tar gzip

    - name: Build all targets
      run: |
        if [[ "${{ github.ref_name }}" == *"-rc"* ]]; then
          echo "RC build detected, using 'make rc'"
          make rc
        else
          echo "Stable build, using 'make release'"
          make release
        fi

    - name: Run basic tests
      run: |
        echo "=== arm64_runner ==="
        ./arm64_runner --version
        echo "=== update_module ==="
        ./update_module --help
        echo "=== livepatch ==="
        ./livepatch --help
        echo "=== module_jit ==="
        ./module_jit --help 2>/dev/null || true

    - name: Run syscall proxy test
      run: |
        sudo apt-get install -y gcc-aarch64-linux-gnu
        aarch64-linux-gnu-gcc -nostdlib -static tests/test_syscalls.s -o tests/test_syscalls 2>/dev/null || true
        if [ -f tests/test_syscalls ]; then
          ./arm64_runner tests/test_syscalls
          echo "Interpreter test passed"
        fi

    - name: Create tar.gz archive
      run: make tar.gz

    - name: Upload build artifacts
      uses: actions/upload-artifact@v5
      with:
        name: arm64-runner-binaries
        path: |
          arm64_runner
          update_module
          livepatch
          module_jit
        retention-days: 30

    - name: Upload archive artifact
      uses: actions/upload-artifact@v5
      with:
        name: arm64-runner-archive
        path: arm64-runner-*.tar.gz
        retention-days: 30

  release:
    needs: build
    if: startsWith(github.ref, 'refs/tags/')
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
    - name: Download archive artifact
      uses: actions/download-artifact@v5
      with:
        name: arm64-runner-archive

    - name: Create GitHub Release
      uses: softprops/action-gh-release@v2
      with:
        files: arm64-runner-*.tar.gz
        generate_release_notes: true
        prerelease: ${{ contains(github.ref_name, '-rc') }}
